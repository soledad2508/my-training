name: Auto-Sync Intervals.icu Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: auto-sync-main
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Verify sync.py exists
        run: |
          if [ ! -f sync.py ]; then
            echo "❌ ERROR: sync.py not found in repository!"
            ls -la
            exit 1
          fi
          echo "✅ sync.py found"

      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "❌ ERROR: ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "❌ ERROR: INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "✅ All secrets configured"

      - name: Run sync
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          WEEK_START: ${{ secrets.WEEK_START }}
          ZONE_PREFERENCE: ${{ secrets.ZONE_PREFERENCE }}
        run: |
          echo "🔍 Debug info:"
          echo "  Python version: $(python --version)"
          echo "  Working directory: $(pwd)"
          echo "  ATHLETE_ID: ${ATHLETE_ID:0:5}..."
          echo "  GITHUB_REPO: $GITHUB_REPO"
          echo ""
          echo "🚀 Running sync script..."
          python sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --github-token "$GITHUB_TOKEN" \
            --github-repo "$GITHUB_REPO" \
            --days 3650

      - name: Verify latest.json was created/updated
        run: |
          if [ -f latest.json ]; then
            echo "✅ latest.json exists"
            echo "File size: $(wc -c < latest.json) bytes"
            echo "Last modified: $(stat -c %y latest.json 2>/dev/null || stat -f %Sm latest.json)"
          else
            echo "⚠️ latest.json not found - might be no changes detected"
          fi

      - name: Archive and commit all files
        if: success()
        run: |
          YEAR_MONTH=$(date -u +"%Y-%m")
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          mkdir -p "archive/${YEAR_MONTH}"

          if [ -f latest.json ]; then
            cp latest.json "archive/${YEAR_MONTH}/${TIMESTAMP}.json"
            echo "✅ Archived to archive/${YEAR_MONTH}/${TIMESTAMP}.json"
          else
            echo "⚠️ Skipping archive - no latest.json to archive"
            exit 0
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Pull latest remote changes FIRST (before staging anything)
          # This avoids autostash conflicts on files the remote also modified
          git fetch origin main
          git rebase origin/main

          # Now stage everything after we're up to date
          git add archive/
          for f in ftp_history.json history.json all_activities.json latest.json intervals.json routes.json README.md; do
            if [ -f "$f" ]; then
              git add "$f"
              echo "✅ Staged $f"
            fi
          done

          if git diff --staged --quiet; then
            echo "⏭️  No changes to commit"
            exit 0
          fi

          git commit -m "Auto sync - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          git push origin HEAD:main
          echo "✅ Committed and pushed"

      - name: Update README with last sync time
        if: success()
        run: |
          SYNC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          if [ -f README.md ]; then
            if grep -q "Last successful sync:" README.md; then
              sed -i "s/\*\*Last successful sync:\*\*.*/\*\*Last successful sync:\*\* ${SYNC_TIME}/" README.md
            else
              sed -i "/badge.svg)/a\\\n\*\*Last successful sync:\*\* ${SYNC_TIME}\n" README.md
            fi
            echo "✅ README updated with sync time: ${SYNC_TIME}"
          fi

      - name: Upload data files for download
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: training-data
          path: |
            latest.json
            history.json
            intervals.json
            routes.json
            ftp_history.json
            all_activities.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Show result
        run: |
          echo "✅ Sync completed successfully!"
          echo "📊 View data: https://raw.githubusercontent.com/${{ github.repository }}/main/latest.json"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::⚠️ Sync failed! Check the logs above for details."
          echo "Common issues:"
          echo "  - Check ATHLETE_ID and INTERVALS_KEY secrets"
          echo "  - Verify Intervals.icu API is accessible"
          echo "  - Check GitHub token permissions"
